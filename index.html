<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#e60012">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>다이소 장보기 도우미</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app">

    <!-- ===== 헤더 ===== -->
    <header class="header">
      <button class="header-back" id="btnBack" style="display:none" aria-label="뒤로가기">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="header-title" id="headerTitle">장보기 리스트</h1>
      <div class="header-actions"></div>
    </header>

    <!-- ===== 메인 화면: 장보기 리스트 ===== -->
    <div class="screen active" id="screenMain">
      <!-- 내 매장 바 -->
      <div class="store-bar" id="storeBar">
        <span class="store-bar-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 10-16 0c0 3 2.7 7 8 11.7z"/></svg>
        </span>
        <span class="store-bar-name" id="storeBarName">매장을 설정해주세요</span>
        <button class="store-bar-btn" id="btnChangeStore">변경</button>
      </div>

      <!-- 리스트 -->
      <div class="list-container" id="shoppingList">
        <!-- 빈 리스트 안내 -->
        <div class="empty-state" id="emptyState">
          <svg width="96" height="96" viewBox="0 0 96 96" fill="none">
            <circle cx="48" cy="48" r="44" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
            <path d="M28 36h6l4 20a3 3 0 003 2.5h18a3 3 0 003-2.5L66 36H38" stroke="#bbb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="41" cy="66" r="2.5" fill="#bbb"/><circle cx="61" cy="66" r="2.5" fill="#bbb"/>
            <path d="M54 42c3-4 8-4 10 0" stroke="#e74c3c" stroke-width="2" stroke-linecap="round" fill="none"/>
            <path d="M58 38v-4m4 2l-3 3m-5-3l3 3" stroke="#e74c3c" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
          <p>장보기 리스트가 비어있어요</p>
          <p class="empty-sub">제품을 검색해서 추가하세요</p>
          <p class="empty-sub">매장을 설정하면 재고도 확인할 수 있어요</p>
          <div class="empty-actions">
            <button class="btn-empty-search" id="btnEmptySearch">검색하기</button>
            <button class="btn-empty-add" id="btnEmptyAdd">직접 추가</button>
          </div>
        </div>
        <!-- 아이템 리스트 -->
        <ul class="item-list" id="itemList"></ul>
      </div>

      <!-- 하단 요약 바 -->
      <div class="summary-bar" id="summaryBar" style="display:none">
        <div class="summary-left">
          <div class="summary-info">
            <span class="summary-count" id="summaryCount">0개 제품</span>
            <span class="summary-total">예상 <strong id="summaryTotal">0</strong>원</span>
          </div>
          <button class="btn-summary-add" id="btnSummaryAdd" aria-label="직접 추가">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
        <button class="btn-check-stock" id="btnCheckStock">재고 확인</button>
        <div class="summary-progress" id="summaryProgress" style="display:none">
          <div class="summary-progress-fill" id="summaryProgressFill"></div>
        </div>
      </div>

      <!-- (하단 액션 — 탭바로 대체됨) -->

      <!-- 리스트 관리 버튼 -->
      <div class="list-actions" id="listActions" style="display:none">
        <button class="btn-text-danger" id="btnClearChecked">체크된 항목 삭제</button>
        <button class="btn-text-danger" id="btnClearAll">전체 초기화</button>
      </div>
    </div>

    <!-- ===== 제품 검색 화면 ===== -->
    <div class="screen" id="screenSearch">
      <div class="search-container" style="position:relative">
        <div class="search-bar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="search" id="searchInput" placeholder="제품명을 검색하세요" autocomplete="off">
          <button class="search-clear" id="searchClear" style="display:none">&times;</button>
        </div>
        <div class="autocomplete-dropdown" id="autocompleteDropdown" style="display:none"></div>
      </div>

      <div class="search-results" id="searchResults">
        <div class="search-history" id="searchHistory"></div>
        <div class="search-hint" id="searchHint">
          <p>검색어를 입력하면 다이소 제품을 찾을 수 있어요</p>
        </div>
      </div>

      <!-- 로딩 -->
      <div class="loading" id="searchLoading" style="display:none">
        <div class="spinner"></div>
        <p>검색 중...</p>
      </div>
    </div>

    <!-- ===== 매장 설정 화면 ===== -->
    <div class="screen" id="screenStore">
      <div class="search-container">
        <div class="search-bar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="search" id="storeSearchInput" placeholder="매장명 또는 지역 검색" autocomplete="off">
          <button class="search-clear" id="storeSearchClear" style="display:none">&times;</button>
        </div>
      </div>

      <div class="search-results" id="storeResults">
        <div class="search-hint" id="storeHint">
          <p>매장명이나 지역을 검색해주세요</p>
          <p class="empty-sub">예: "강남", "홍대", "수원역"</p>
        </div>
      </div>

      <!-- 현재 매장 정보 -->
      <div class="current-store" id="currentStoreInfo" style="display:none">
        <h3>현재 내 매장</h3>
        <div class="store-card selected" id="currentStoreCard"></div>
        <button class="btn-text-danger" id="btnRemoveStore">매장 해제</button>
      </div>

      <!-- 로딩 -->
      <div class="loading" id="storeLoading" style="display:none">
        <div class="spinner"></div>
        <p>매장 검색 중...</p>
      </div>
    </div>

    <!-- ===== 재고 확인 결과 화면 ===== -->
    <div class="screen" id="screenStock">
      <div class="stock-header">
        <h2 id="stockStoreName">매장 재고 확인</h2>
        <p class="stock-subtitle" id="stockProgress">확인 중...</p>
        <div class="progress-bar" id="stockProgressBar">
          <div class="progress-fill" id="stockProgressFill"></div>
        </div>
      </div>
      <ul class="stock-list" id="stockList"></ul>
    </div>

    <!-- ===== 직접 추가 모달 ===== -->
    <div class="modal-overlay" id="modalOverlay" style="display:none">
      <div class="modal">
        <h3>제품 직접 추가</h3>
        <div class="form-group">
          <label for="manualName">제품명</label>
          <input type="text" id="manualName" placeholder="예: 접착 테이프">
        </div>
        <div class="form-group">
          <label for="manualPrice">가격 (원)</label>
          <input type="number" id="manualPrice" placeholder="1000" min="0" step="100">
        </div>
        <div class="form-group">
          <label for="manualQty">수량</label>
          <input type="number" id="manualQty" value="1" min="1" max="99">
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" id="btnModalCancel">취소</button>
          <button class="btn-primary" id="btnModalAdd">추가</button>
        </div>
      </div>
    </div>

    <!-- ===== 확인 다이얼로그 ===== -->
    <div class="modal-overlay" id="confirmOverlay" style="display:none">
      <div class="modal">
        <p id="confirmMessage"></p>
        <div class="modal-actions">
          <button class="btn-secondary" id="btnConfirmCancel">취소</button>
          <button class="btn-primary btn-danger" id="btnConfirmOk">확인</button>
        </div>
      </div>
    </div>

    <!-- ===== 토스트 알림 ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== 하단 탭바 ===== -->
    <nav class="tab-bar" id="tabBar">
      <button class="tab-item active" data-tab="main" aria-label="리스트">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span>리스트</span>
      </button>
      <button class="tab-item" data-tab="search" aria-label="검색">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <span>검색</span>
      </button>
      <button class="tab-item" data-tab="store" aria-label="매장">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>매장</span>
      </button>
    </nav>

  </div>

  <script src="js/mcp-client.js?v=6"></script>
  <script src="js/storage.js?v=6"></script>
  <script src="js/api.js?v=6"></script>
  <script src="js/app.js?v=6"></script>
</body>
</html>
